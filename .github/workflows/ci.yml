name: CI

on:
  push:
    branches:
    - master
    - pgagroal-cli-ci
  pull_request:
    branches:
    - master

jobs:
  build-linux:

    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    - name: Add PostgreSQL apt repository
      run: |
        sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
        sudo wget --quiet --output-document /etc/apt/trusted.gpg.d/apt.postgresql.org.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
    - name: Update system
      run: sudo apt update
#    - name: Install libev
#      run: sudo apt install -y libev4 libev-dev
#    - name: Install cJSON
#      run: sudo apt install -y libcjson1 libcjson-dev
#    - name: Install systemd
#      run: sudo apt install -y libsystemd-dev
#    - name: Install rst2man
#      run: sudo apt install -y python3-docutils
#    - name: Install clang
#      run: sudo apt install -y clang
    - name: Install PostgreSQL
      run: sudo apt install -y postgresql
    - name: Start postgres
      run: |
        output=$(su postgres -c '/usr/lib/postgresql/$(psql --version | grep -Eo "[0-9]{1,2}" | head -1)/bin/pg_ctl start -D /etc/postgresql/16/main/' | grep "database system is ready to accept connections")
        if [ -z "$output" ]; then exit 1; fi
        exit
